<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equilíbrio Multimarcas | Minha Conta</title>
    <link rel="stylesheet" href="css/variaveis.css">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/componentes/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="index.html">Equilíbrio<span>.</span></a>
            </div>
            <nav class="nav-menu">
                <a href="index.html">Home</a>
                <a href="produtos.html">Produtos</a>
            </nav>
            <div class="header-actions">
                <a href="favoritos.html" class="action-icon">
                    <i class="far fa-heart"></i>
                </a>
                <a href="#" class="action-icon open-cart">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="badge" id="cart-badge">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="auth-layout">
        <div class="auth-container">
            
            <div id="panel-dashboard" style="display: none; padding: 40px 30px; text-align: center; flex-direction: column; gap: 20px;">
                <i class="fas fa-crown" style="font-size: 3rem; color: var(--cor-primaria);"></i>
                <h2 style="text-transform: uppercase; font-weight: 900;">Olá, <span id="user-name-display">Cliente</span>!</h2>
                <p style="color: var(--cor-texto-secundario); font-size: 0.95rem;">Você está conectado à sua conta VIP do Equilíbrio Multimarcas. Seus produtos e sessões estão sincronizados com segurança.</p>
                <button onclick="fazerLogout()" class="auth-btn" style="background-color: #dc3545; width: 100%;">Sair da Conta</button>
            </div>

            <div id="panel-auth-forms">
                <div class="auth-tabs">
                    <div class="auth-tab active" onclick="alternarAba('login')">Entrar</div>
                    <div class="auth-tab" onclick="alternarAba('cadastro')">Criar Conta</div>
                </div>

                <div class="auth-forms-wrapper">
                    <form id="form-login" class="auth-form active">
                        <div id="feedback-login" class="form-feedback"></div>
                        <div class="form-control">
                            <label for="login-email">E-mail</label>
                            <input type="email" id="login-email" required placeholder="seu@email.com">
                        </div>
                        <div class="form-control">
                            <label for="login-senha">Senha</label>
                            <input type="password" id="login-senha" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="auth-btn">Acessar Conta</button>
                    </form>

                    <form id="form-cadastro" class="auth-form" style="width: 100%; max-width: 650px; margin: 0 auto;">
                        <div id="feedback-cadastro" class="form-feedback"></div>
                        
                        <h4 style="margin: 20px 0 15px 0; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; color: #777; border-bottom: 2px solid #f0f0f0; padding-bottom: 6px; font-weight: 700;">
                            <i class="fas fa-user-circle" style="margin-right: 6px;"></i> Dados Pessoais
                        </h4>
                        
                        <div class="form-control" style="margin-bottom: 15px;">
                            <label for="cad-nome">Nome Completo</label>
                            <input type="text" id="cad-nome" required placeholder="João Silva" style="width: 100%; box-sizing: border-box;">
                        </div>
                        
                        <div style="display: block; margin-bottom: 0;">
                            <div style="display: table; width: 100%; table-layout: fixed; border-collapse: separate; border-spacing: 15px 0; margin-left: -15px; width: calc(100% + 30px);">
                                <div style="display: table-cell; width: 50%; padding-bottom: 15px; vertical-align: top;">
                                    <div class="form-control">
                                        <label for="cad-email">E-mail</label>
                                        <input type="email" id="cad-email" required placeholder="seu@email.com" style="width: 100%; box-sizing: border-box;">
                                    </div>
                                </div>
                                <div style="display: table-cell; width: 50%; padding-bottom: 15px; vertical-align: top;">
                                    <div class="form-control">
                                        <label for="cad-telefone">Telefone / WhatsApp</label>
                                        <input type="text" id="cad-telefone" required placeholder="(00) 00000-0000" style="width: 100%; box-sizing: border-box;">
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-control" style="margin-bottom: 25px;">
                            <label for="cad-senha">Senha Segura</label>
                            <input type="password" id="cad-senha" required placeholder="Mínimo de 6 caracteres" style="width: 100%; box-sizing: border-box;">
                        </div>

                        <h4 style="margin: 25px 0 15px 0; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; color: #777; border-bottom: 2px solid #f0f0f0; padding-bottom: 6px; font-weight: 700;">
                            <i class="fas fa-map-marker-alt" style="margin-right: 6px;"></i> Endereço de Entrega
                        </h4>
                        
                        <div class="form-control" style="margin-bottom: 15px;">
                            <label for="cad-cep">CEP</label>
                            <input type="text" id="cad-cep" required placeholder="00000-000" onblur="buscarCepCadastro()" style="width: 100%; box-sizing: border-box;">
                        </div>
                        
                        <div class="form-control" style="margin-bottom: 15px;">
                            <label for="cad-logradouro">Rua / Avenida</label>
                            <input type="text" id="cad-logradouro" required placeholder="Ex: Av. Paulista" style="width: 100%; box-sizing: border-box;">
                        </div>
                        
                        <div style="display: block; margin-bottom: 0;">
                            <div style="display: table; width: 100%; table-layout: fixed; border-collapse: separate; border-spacing: 15px 0; margin-left: -15px; width: calc(100% + 30px);">
                                <div style="display: table-cell; width: 40%; padding-bottom: 15px; vertical-align: top;">
                                    <div class="form-control">
                                        <label for="cad-numero">Número</label>
                                        <input type="text" id="cad-numero" required placeholder="Ex: 1000" style="width: 100%; box-sizing: border-box;">
                                    </div>
                                </div>
                                <div style="display: table-cell; width: 60%; padding-bottom: 15px; vertical-align: top;">
                                    <div class="form-control">
                                        <label for="cad-complemento">Complemento</label>
                                        <input type="text" id="cad-complemento" placeholder="Apto, Bloco..." style="width: 100%; box-sizing: border-box;">
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-control" style="margin-bottom: 15px;">
                            <label for="cad-bairro">Bairro</label>
                            <input type="text" id="cad-bairro" required placeholder="Ex: Centro" style="width: 100%; box-sizing: border-box;">
                        </div>
                        
                        <div style="display: block; margin-bottom: 0;">
                            <div style="display: table; width: 100%; table-layout: fixed; border-collapse: separate; border-spacing: 15px 0; margin-left: -15px; width: calc(100% + 30px);">
                                <div style="display: table-cell; width: 75%; padding-bottom: 15px; vertical-align: top;">
                                    <div class="form-control">
                                        <label for="cad-cidade">Cidade</label>
                                        <input type="text" id="cad-cidade" required placeholder="Ex: São Paulo" style="width: 100%; box-sizing: border-box;">
                                    </div>
                                </div>
                                <div style="display: table-cell; width: 25%; padding-bottom: 15px; vertical-align: top;">
                                    <div class="form-control">
                                        <label for="cad-estado">UF</label>
                                        <input type="text" id="cad-estado" required maxlength="2" placeholder="SP" style="width: 100%; box-sizing: border-box; text-transform: uppercase;">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="auth-btn" style="margin-top: 25px; width: 100%; padding: 14px; font-weight: bold; font-size: 1rem;">Finalizar Cadastro</button>
                    </form>

                    <script>
                    async function buscarCepCadastro() {
                        const cep = document.getElementById('cad-cep').value.replace(/\D/g, '');
                        if (cep.length === 8) {
                            try {
                                const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                                const dados = await res.json();
                                if (!dados.erro) {
                                    document.getElementById('cad-logradouro').value = dados.logradouro;
                                    document.getElementById('cad-bairro').value = dados.bairro;
                                    document.getElementById('cad-cidade').value = dados.localidade;
                                    document.getElementById('cad-estado').value = dados.uf;
                                    document.getElementById('cad-numero').focus(); 
                                }
                            } catch(e) { console.error("Erro ao buscar CEP", e); }
                        }
                    }
                    </script>
                </div>
            </div>

        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-drawer-header">
            <h3>Seu Carrinho</h3>
            <button class="close-cart-btn" id="close-cart-btn"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-drawer-body" id="minicart-body"></div>
        <div class="cart-drawer-footer">
            <div class="cart-drawer-total">
                <span>Subtotal:</span>
                <span id="minicart-total">R$ 0,00</span>
            </div>
            <button class="hero-btn" style="width: 100%; text-align: center;" onclick="window.location.href='checkout.html'">Finalizar Compra</button>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
